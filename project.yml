name: SnapRoute
options:
  bundleIdPrefix: com.rawplusdry
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

targets:
  SnapRoute:
    type: application
    platform: iOS
    sources:
      - SnapRoute
      - Shared
    info:
      path: SnapRoute/Info.plist
      properties:
        CFBundleDisplayName: Emberleap
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "42"
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.rawplusdry.snaproute
            CFBundleURLSchemes:
              - snaproute
        LSApplicationQueriesSchemes:
          - obsidian
          - snaproute
        LSSupportsOpeningDocumentsInPlace: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: SnapRoute/SnapRoute.entitlements
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: SnapRoute/Info.plist
        DEVELOPMENT_TEAM: BU7LKZ75A7
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.rawplusdry.snaproute
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: SnapRouteShare
      - target: SnapRouteAction

  SnapRouteShare:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
      - Shared
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Emberleap
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "42"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: ShareExtension/Info.plist
        DEVELOPMENT_TEAM: BU7LKZ75A7
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.rawplusdry.snaproute.share

  SnapRouteAction:
    type: app-extension
    platform: iOS
    sources:
      - ActionExtension
      - Shared
    info:
      path: ActionExtension/Info.plist
      properties:
        CFBundleDisplayName: Emberleap
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "42"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ui-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ActionViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
    entitlements:
      path: ActionExtension/ActionExtension.entitlements
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: ActionExtension/Info.plist
        DEVELOPMENT_TEAM: BU7LKZ75A7
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.rawplusdry.snaproute.action
