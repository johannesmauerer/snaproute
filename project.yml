name: SnapRoute
options:
  bundleIdPrefix: com.rawplusdry
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

targets:
  SnapRoute:
    type: application
    platform: iOS
    sources:
      - SnapRoute
    info:
      path: SnapRoute/Info.plist
      properties:
        CFBundleDisplayName: SnapRoute
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: SnapRoute/Info.plist
        DEVELOPMENT_TEAM: BU7LKZ75A7
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.rawplusdry.snaproute
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
